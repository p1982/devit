version: '3.9'

services:
  node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devit-node
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3000
    ports:
      - '3000:3000'
      - '4200:4200'
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: devit-redis
    ports:
      - '6379:6379'

